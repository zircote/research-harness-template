---
# Trend-Analysis (Foresight) Ontology
#
# A MIF entity ontology for strategic foresight and trend analysis: weak signals,
# drivers of change, trends and megatrends, adoption curves, forecasts, scenarios,
# critical uncertainties, wild cards, emerging issues, horizons, implications,
# visions, and roadmaps. Extends the MIF base cognitive triad with foresight
# entity types grounded in actively-used, named practitioner foresight
# methodologies.
#
# Compatible with: mif-base v1.0.0, shared-traits v1.0.0
#
# Version: 0.1.0
#
# Provenance: authored from the `domain-ontology-pack-expansion` research session
# (entity-inventory.json, 14 trend-analysis rows; relationship-inventory.json, 11
# trend-analysis edges; ontology-build-spec.md §2.5, §3.1). Every entity type
# traces to a named class in a cited foresight source vocabulary. `trend` is the
# canonical generic minted here (software-engineering's adoption-trend is being
# deprecated separately and is NOT referenced).
#
# Base-value note: the inventory assigns a non-triad base to six types
# (adoption-curve, forecast, horizon, implication, scenario, vision). The mif-base
# cognitive triad has only semantic / episodic / procedural roots, so all six are
# remapped to base `semantic` and placed under the `_semantic/foresight` namespace
# tree. Each carries an inline remap comment recording the inventory's value.
#
# Sources:
# - IFTF (Institute for the Future) Foresight       https://www.iftf.org/insights/drivers-signals-differences/
# - EU JRC Knowledge4Policy Foresight Glossary       https://knowledge4policy.ec.europa.eu/foresight/glossary_en
# - EU JRC Global Trends                             https://joint-research-centre.ec.europa.eu/scientific-activities-z/foresight/jrc-global-trends_en
# - Sitra Megatrends                                 https://www.sitra.fi/en/topics/megatrends/
# - Shell Scenario Planning / GBN                    https://www.shell.com/news-and-insights/scenarios.html
# - Rogers, Diffusion of Innovations                 https://en.wikipedia.org/wiki/Diffusion_of_innovations
# - Gartner Hype Cycle                               https://www.gartner.com/en/research/methodologies/gartner-hype-cycle
# - Three Horizons Framework (Sharpe/Curry/Leicester) https://en.wikipedia.org/wiki/Three_Horizons
# - Futures Wheel (Jerome Glenn)                     https://www.toolshero.com/decision-making/futures-wheel-jerome-glenn/
# - OECD-OPSI Futures & Foresight                    https://oecd-opsi.org/guide/futures-and-foresight/
# - Technology Roadmapping (Phaal/Farrukh)           https://en.wikipedia.org/wiki/Technology_roadmap

ontology:
  id: trend-analysis
  version: "0.1.0"
  description: "Strategic foresight and trend-analysis domain ontology — signals, drivers, trends, scenarios, forecasts"
  extends:
    - mif-base
    - shared-traits
# ===========================================================================
# CUSTOM NAMESPACES (nested under the mif-base cognitive triad)
# ===========================================================================
namespaces:
  semantic:
    children:
      foresight:
        description: "Signals, drivers, trends, megatrends, uncertainties, and derived foresight artifacts"
        type_hint: semantic
        children:
          curves:
            description: "Adoption / maturity curves (S-curve, hype cycle)"
            type_hint: semantic
          forecasts:
            description: "Forecasts and projected future outcomes"
            type_hint: semantic
          scenarios:
            description: "Plausible future narratives and scenario sets"
            type_hint: semantic
          horizons:
            description: "Three-Horizons temporal planning zones"
            type_hint: semantic
          implications:
            description: "Cascading consequences mapped from change (futures wheel)"
            type_hint: semantic
          visions:
            description: "Normative preferred future states (backcasting)"
            type_hint: semantic
  procedural:
    children:
      roadmaps:
        description: "Time-sequenced strategic and technology roadmaps"
        type_hint: procedural
# ===========================================================================
# ENTITY TYPES
# ===========================================================================
entity_types:
  # ----- Signals, drivers, trends (IFTF / EU JRC K4P) ---------------------
  - name: signal
    description: "A weak signal: a concrete local artifact or event hinting at change"
    base: semantic
    # Signal / Weak Signal
    traits:
      - cited
      - dated
    schema:
      required:
        - name
        - observation
      properties:
        name:
          type: string
        observation:
          type: string
        source_url:
          type: string
          format: uri
        observed_date:
          type: string
          format: date
        steep_category:
          type: string
          enum:
            - social
            - technological
            - environmental
            - economic
            - political
        novelty:
          type: string
          enum:
            - weak
            - emerging
            - strengthening
        geographic_scope:
          type: string
        related_driver:
          type: string
    source_vocab: IFTF Foresight / EU JRC K4P
    source_class: Signal / Weak Signal
    prior_art: https://www.iftf.org/foresight-tools/
    disposition: mint
  - name: driver
    description: "A driver of change: a broad long-term force shaping the future"
    base: semantic
    # Driver of Change
    traits:
      - cited
    schema:
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        steep_category:
          type: string
          enum:
            - social
            - technological
            - environmental
            - economic
            - political
        time_horizon:
          type: string
        impact_level:
          type: string
          enum:
            - low
            - medium
            - high
        evidence_signals:
          type: array
          items:
            type: string
        certainty_level:
          type: string
          enum:
            - low
            - medium
            - high
    source_vocab: IFTF / EU JRC
    source_class: Driver of Change
    prior_art: https://knowledge4policy.ec.europa.eu/foresight/glossary_en
    disposition: mint
  - name: trend
    description: "A trend: a currently visible direction of change (the canonical generic)"
    base: semantic
    # Trend
    traits:
      - cited
      - dated
    schema:
      required:
        - name
        - direction
      properties:
        name:
          type: string
        direction:
          type: string
        evidence:
          type: string
        maturity:
          type: string
          enum:
            - emerging
            - mainstream
            - mature
            - declining
        scope:
          type: string
        steep_category:
          type: string
          enum:
            - social
            - technological
            - environmental
            - economic
            - political
        strength:
          type: string
          enum:
            - weak
            - moderate
            - strong
        first_observed:
          type: string
          format: date
    source_vocab: IFTF / Gartner / EU JRC
    source_class: Trend
    prior_art: https://www.iftf.org/foresight-tools/
    disposition: mint
  - name: megatrend
    description: "A megatrend: a long-term structural transformation operating over a decade or more"
    base: semantic
    # Megatrend (long-term structural driver >10yr)
    traits:
      - cited
      - dated
    schema:
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        temporal_scale:
          type: string
        scope:
          type: string
        sub_trends:
          type: array
          items:
            type: string
        related_megatrends:
          type: array
          items:
            type: string
        policy_domains_affected:
          type: array
          items:
            type: string
        last_reviewed:
          type: string
          format: date
    source_vocab: EU JRC Global Trends / IFTF
    source_class: Megatrend (long-term structural driver >10yr)
    prior_art: https://joint-research-centre.ec.europa.eu/scientific-activities-z/foresight/jrc-global-trends_en
    disposition: mint
  - name: emerging-issue
    description: "An emerging issue: a novel phenomenon gaining recognition before it becomes a trend"
    base: semantic
    # Emerging Issue (novel phenomenon gaining recognition)
    traits:
      - cited
      - dated
    schema:
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        novelty_stage:
          type: string
        recognition_level:
          type: string
        competing_issues:
          type: array
          items:
            type: string
        steep_category:
          type: string
          enum:
            - social
            - technological
            - environmental
            - economic
            - political
        first_identified:
          type: string
          format: date
        source_signal:
          type: string
        policy_relevance:
          type: string
    source_vocab: Molitor / EU JRC K4P Foresight
    source_class: Emerging Issue
    prior_art: https://knowledge4policy.ec.europa.eu/foresight/glossary_en
    disposition: mint
  - name: wild-card
    description: "A wild card: a low-probability, high-impact rupture event"
    base: semantic
    # Wild Card (low-probability, high-impact event)
    traits:
      - cited
      - dated
    schema:
      required:
        - name
        - impact_domain
      properties:
        name:
          type: string
        description:
          type: string
        probability_estimate:
          type: string
          enum:
            - very-low
            - low
        impact_level:
          type: string
          enum:
            - high
            - very-high
            - extreme
        impact_domain:
          type: array
          items:
            type: string
        steep_category:
          type: string
          enum:
            - social
            - technological
            - environmental
            - economic
            - political
        trigger_conditions:
          type: string
        preparedness_notes:
          type: string
    source_vocab: EU JRC K4P Foresight / IFTF
    source_class: Wild Card (low-probability, high-impact event)
    prior_art: https://knowledge4policy.ec.europa.eu/foresight/glossary_en
    disposition: mint
  - name: critical-uncertainty
    description: "A critical uncertainty: a high-impact factor that is genuinely unpredictable, used as a scenario axis"
    base: semantic
    # Critical Uncertainty (high-impact, genuinely unpredictable factor)
    traits:
      - cited
      - dated
    schema:
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        impact_level:
          type: string
          enum:
            - low
            - medium
            - high
        uncertainty_level:
          type: string
          enum:
            - low
            - medium
            - high
        axis_pole_low:
          type: string
        axis_pole_high:
          type: string
        related_drivers:
          type: array
          items:
            type: string
        scenarios_generated:
          type: array
          items:
            type: string
    source_vocab: Shell / GBN Scenario Planning
    source_class: Critical Uncertainty
    prior_art: https://www.shell.com/news-and-insights/scenarios.html
    disposition: mint
  # ----- Analytical foresight artifacts ----------------------------------
  - name: adoption-curve
    # inventory base 'analytical' remapped to semantic (no _analytical triad root)
    description: "An adoption / maturity curve positioning a subject on an S-curve or hype cycle"
    base: semantic
    # S-Curve / Technology Maturity Level
    traits:
      - cited
      - dated
    schema:
      required:
        - subject
        - model
      properties:
        subject:
          type: string
        model:
          type: string
          enum:
            - rogers-s-curve
            - gartner-hype-cycle
        current_phase:
          type: string
        adopter_segment:
          type: string
          enum:
            - innovators
            - early-adopters
            - early-majority
            - late-majority
            - laggards
        time_to_plateau:
          type: string
        critical_mass_reached:
          type: boolean
        evidence:
          type: string
    source_vocab: Rogers Diffusion of Innovations / Gartner Hype Cycle
    source_class: S-Curve / Technology Maturity Level
    prior_art: https://en.wikipedia.org/wiki/Diffusion_of_innovations
    disposition: mint
  - name: forecast
    # inventory base 'analytical' remapped to semantic (no _analytical triad root)
    description: "A forecast: a projected future outcome grounded in signals, drivers, and trends"
    base: semantic
    # Forecast
    traits:
      - cited
      - dated
      - timeline
    schema:
      required:
        - statement
        - horizon
      properties:
        statement:
          type: string
        horizon:
          type: string
        confidence_level:
          type: string
          enum:
            - low
            - medium
            - high
        basis_signals:
          type: array
          items:
            type: string
        basis_drivers:
          type: array
          items:
            type: string
        scenario_type:
          type: string
          enum:
            - baseline
            - alternative
            - wildcard
        created_date:
          type: string
          format: date
        author:
          type: string
    source_vocab: IFTF Foresight
    source_class: Forecast
    prior_art: https://www.iftf.org/foresight-tools/
    disposition: mint
  - name: scenario
    # inventory base 'analytical' remapped to semantic (no _analytical triad root)
    description: "A scenario: a plausible, internally consistent future narrative"
    base: semantic
    # Scenario (plausible future narrative)
    traits:
      - cited
      - versioned
    schema:
      required:
        - name
        - horizon
      properties:
        name:
          type: string
        narrative:
          type: string
        horizon:
          type: string
        scenario_type:
          type: string
          enum:
            - baseline
            - alternative
            - aspirational
            - collapse
        critical_uncertainties_used:
          type: array
          items:
            type: string
        key_drivers:
          type: array
          items:
            type: string
        plausibility_rationale:
          type: string
        world_state:
          type: string
    source_vocab: Shell Scenario Planning / EU JRC
    source_class: Scenario (plausible future narrative)
    prior_art: https://www.shell.com/what-we-do/scenarios.html
    disposition: mint
  - name: horizon
    # inventory base 'analytical' remapped to semantic (no _analytical triad root)
    description: "A horizon: a Three-Horizons temporal planning zone (H1/H2/H3)"
    base: semantic
    # Horizon (temporal planning zone H1/H2/H3)
    traits:
      - cited
      - dated
    schema:
      required:
        - label
        - horizon_type
      properties:
        label:
          type: string
        horizon_type:
          type: string
          enum:
            - h1
            - h2
            - h3
        time_span:
          type: string
        description:
          type: string
        dominant_system:
          type: string
        key_innovations:
          type: array
          items:
            type: string
        mindset_type:
          type: string
        transition_triggers:
          type: array
          items:
            type: string
    source_vocab: Three Horizons (Sharpe/Curry/Leicester)
    source_class: Horizon (H1/H2/H3)
    prior_art: https://en.wikipedia.org/wiki/Three_Horizons
    disposition: mint
  - name: implication
    # inventory base 'analytical' remapped to semantic (no _analytical triad root)
    description: "An implication: a cascading consequence of a change (futures wheel ring)"
    base: semantic
    # Implication (cascading consequence of change)
    traits:
      - cited
    schema:
      required:
        - name
        - parent_change
      properties:
        name:
          type: string
        description:
          type: string
        order:
          type: integer
        parent_change:
          type: string
        impact_domain:
          type: string
        steep_category:
          type: string
          enum:
            - social
            - technological
            - environmental
            - economic
            - political
        valence:
          type: string
          enum:
            - positive
            - negative
            - neutral
            - mixed
        probability_estimate:
          type: string
          enum:
            - low
            - medium
            - high
    source_vocab: Futures Wheel (Jerome Glenn)
    source_class: Implication / Consequence Ring
    prior_art: https://www.toolshero.com/decision-making/futures-wheel-jerome-glenn/
    disposition: mint
  - name: vision
    # inventory base 'analytical' remapped to semantic (no _analytical triad root)
    description: "A vision: a desired or preferred future state used as a backcasting anchor"
    base: semantic
    # Vision (desired/preferred future state)
    traits:
      - cited
      - stakeholders
    schema:
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
        target_horizon:
          type: string
        normative_basis:
          type: string
        stakeholders:
          type: array
          items:
            type: string
        backcasting_pathway:
          type: string
        key_milestones:
          type: array
          items:
            type: string
        values_underpinning:
          type: array
          items:
            type: string
    source_vocab: OECD-OPSI Futures / Backcasting (Robinson)
    source_class: Vision / Preferred Future State
    prior_art: https://oecd-opsi.org/guide/futures-and-foresight/
    disposition: mint
  # ----- Roadmap (procedural) --------------------------------------------
  - name: roadmap
    description: "A roadmap: a time-sequenced action plan working backward from a vision"
    base: procedural
    # Technology/Strategic Roadmap (time-sequenced action plan)
    traits:
      - cited
      - versioned
      - timeline
    schema:
      required:
        - name
        - scope
      properties:
        name:
          type: string
        scope:
          type: string
        target_vision:
          type: string
        milestones:
          type: array
          items:
            type: string
        time_horizon:
          type: string
        technology_areas:
          type: array
          items:
            type: string
        resource_requirements:
          type: string
        dependencies:
          type: array
          items:
            type: string
        last_updated:
          type: string
          format: date
    source_vocab: Technology Roadmapping (Phaal/Farrukh)
    source_class: Technology / Strategic Roadmap
    prior_art: https://en.wikipedia.org/wiki/Technology_roadmap
    disposition: mint
# ===========================================================================
# RELATIONSHIPS  (grounded in named foresight methodologies + W3C RDFS)
# ===========================================================================
relationships:
  constrains:
    description: "A critical-uncertainty constrains and differentiates the scenario space (Shell/GBN 2x2 axis)"
    from:
      - critical-uncertainty
    to:
      - scenario
    symmetric: false
  generates:
    description: "A driver produces a trend (IFTF: drivers precipitate visible trends)"
    from:
      - driver
    to:
      - trend
    symmetric: false
  grounds:
    description: "A driver grounds a forecast (IFTF: drivers/trends are building blocks of forecasts)"
    from:
      - driver
    to:
      - forecast
    symmetric: false
  indicates:
    description: "A signal indicates a driver (IFTF: signals are symptoms of drivers)"
    from:
      - signal
    to:
      - driver
    symmetric: false
  informs:
    description: "A scenario informs a vision (OECD-OPSI: scenarios reveal futures from which a preferred future is selected)"
    from:
      - scenario
    to:
      - vision
    symmetric: false
  matures_into:
    description: "A signal matures into a trend (IFTF: weak signal strengthens into a visible trend)"
    from:
      - signal
    to:
      - trend
    symmetric: false
  operationalizes:
    description: "A vision operationalizes into a roadmap (backcasting works backward from a vision to a time-sequenced roadmap)"
    from:
      - vision
    to:
      - roadmap
    symmetric: false
  placed_on:
    description: "A trend is placed on an adoption-curve (Rogers/Gartner: a trend is positioned on an S-curve or hype cycle)"
    from:
      - trend
    to:
      - adoption-curve
    symmetric: false
  produces:
    description: "A trend produces an implication (Futures Wheel: a trend produces cascading implications)"
    from:
      - trend
    to:
      - implication
    symmetric: false
  specializes:
    description: "A megatrend specializes a trend (rdfs:subClassOf — megatrend is a structural subtype of trend)"
    from:
      - megatrend
    to:
      - trend
    symmetric: false
  intensifies:
    description: "A wild-card intensifies a critical-uncertainty (rdfs:subClassOf — a wild card is a low-probability, very-high-impact subtype of critical uncertainty)"
    from:
      - wild-card
    to:
      - critical-uncertainty
    symmetric: false
# ===========================================================================
# DISCOVERY PATTERNS
# ===========================================================================
discovery:
  enabled: true
  confidence_threshold: 0.8
  patterns:
    - content_pattern: "\\b(weak signal|signal of change|early indicator)\\b"
      suggest_entity: signal
      suggest_namespace: _semantic/foresight
    - content_pattern: "\\b(driver of change|STEEP|long-term force)\\b"
      suggest_entity: driver
      suggest_namespace: _semantic/foresight
    - content_pattern: "\\b(trend|direction of change|trend radar)\\b"
      suggest_entity: trend
      suggest_namespace: _semantic/foresight
    - content_pattern: "\\b(hype cycle|trough of disillusionment|crossing the chasm|S-curve|early adopter)\\b"
      suggest_entity: adoption-curve
      suggest_namespace: _semantic/foresight/curves
    - content_pattern: "\\b(forecast|projected (future|to)|expected to reach)\\b"
      suggest_entity: forecast
      suggest_namespace: _semantic/foresight/forecasts
    - content_pattern: "\\b(megatrend|mega[- ]trend|structural transformation|decade[- ]long trend)\\b"
      suggest_entity: megatrend
      suggest_namespace: _semantic/foresight
    - content_pattern: "\\b(scenario|plausible future|strategic uncertainty|world in 20\\d\\d)\\b"
      suggest_entity: scenario
      suggest_namespace: _semantic/foresight/scenarios
    - content_pattern: "\\b(wild[- ]?card|black swan|low[- ]probability.*high[- ]impact|rupture event)\\b"
      suggest_entity: wild-card
      suggest_namespace: _semantic/foresight
