---
# Data Engineering Ontology
#
# A research-oriented ontology for the data engineering domain: data contracts,
# data products, governance, data quality, storage architecture, pipelines, and
# the platforms/tools the field runs on.
#
# Compatible with: mif-base v0.1.0 (cognitive triad hierarchy)
#
# Version: 0.1.0
# Last Updated: 2026-06-20

ontology:
  id: data-engineering
  version: "0.1.0"
  description: "Data engineering domain ontology"
  extends:
    - mif-base

# Custom Namespaces
# These extend the base cognitive triad hierarchy.
namespaces:
  semantic:
    children:
      contracts:
        description: "Data contracts and product interface agreements"
        type_hint: semantic
      governance:
        description: "Governance policies, controls, and stewardship"
        type_hint: semantic
      storage:
        description: "Storage and scaling architectures"
        type_hint: semantic
  procedural:
    children:
      pipelines:
        description: "Pipeline and data-movement patterns"
        type_hint: procedural

# Entity Types
# Structured entities with JSON Schema validation.
entity_types:
  - name: data-contract
    description: "A data contract: an enforceable agreement on schema, semantics, and SLAs between data producers and consumers"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
      properties:
        name:
          type: string
          description: "Contract name or subject"
        scope:
          type: string
          description: "What the contract covers (dataset, interface, domain)"
        parties:
          type: string
          description: "Producer and consumer parties bound by the contract"
        enforcement:
          type: string
          description: "How the contract is enforced (CI gate, registry, runtime check)"
  - name: data-product
    description: "A data product: a discoverable, governed, consumable data asset with an owner and interface"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
      properties:
        name:
          type: string
          description: "Data product name"
        domain:
          type: string
          description: "Owning business domain"
        interface:
          type: string
          description: "Consumption interface (view, table, API, share)"
        sla:
          type: string
          description: "Service-level agreement (freshness, availability)"
  - name: data-governance-policy
    description: "A governance policy or control: a rule governing access, retention, classification, or stewardship of data"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - policy_name
      properties:
        policy_name:
          type: string
          description: "Policy or control name"
        scope:
          type: string
          description: "What the policy governs (catalog, schema, table, tag)"
        control:
          type: string
          description: "Control type (preventive, detective, corrective)"
        enforcement:
          type: string
          description: "Mechanism that enforces the policy"
  - name: data-quality-rule
    description: "A data quality rule, check, or assertion applied to data to detect or prevent defects"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - rule_name
      properties:
        rule_name:
          type: string
          description: "Rule or check name"
        dimension:
          type: string
          description: "Quality dimension (freshness, completeness, validity, uniqueness, drift)"
        check:
          type: string
          description: "How the check is expressed or computed"
        action:
          type: string
          description: "Reaction on violation (drop, mark, quarantine, alert, fail)"
  - name: storage-architecture
    description: "A storage or scaling architecture for data (e.g. Postgres sharding, Snowflake multi-tenant isolation, lakehouse table format)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
      properties:
        name:
          type: string
          description: "Architecture name"
        pattern:
          type: string
          description: "The structural pattern (proxy, extension, shared/isolated, branching)"
        scaling_model:
          type: string
          description: "How it scales (sharding, read replicas, serverless, multi-cluster)"
        tradeoffs:
          type: string
          description: "Key trade-offs and constraints"
  - name: pipeline-pattern
    description: "A pipeline or data-movement pattern (e.g. ETL/ELT, streaming, write-audit-publish, reverse-ETL)"
    base: procedural
    traits:
      - cited
    schema:
      required:
        - pattern_name
      properties:
        pattern_name:
          type: string
          description: "Pattern name"
        context:
          type: string
          description: "When to use this pattern"
        solution:
          type: string
          description: "How the pattern moves or validates data"
  - name: data-platform
    description: "A named data platform, tool, catalog, or engine (e.g. Snowflake, Postgres, dbt, Airflow, Kafka, Iceberg, Unity Catalog)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
        - category
      properties:
        name:
          type: string
          description: "Platform or tool name"
        category:
          type: string
          description: "Free-form category (warehouse, catalog, observability, streaming, proxy, table-format, transformation, etc.)"
        vendor:
          type: string
          description: "Maintaining vendor or project"
        use_case:
          type: string
          description: "Primary role in the data stack"
  # Reused research types (same shapes as software-engineering)
  - name: technology
    description: "A technology, framework, or tool"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
        - category
      properties:
        name:
          type: string
        category:
          type: string
          enum:
            - database
            - framework
            - language
            - infrastructure
            - tool
            - library
        use_case:
          type: string
          description: "Why/where this technology is used"
  - name: design-pattern
    description: "A design pattern or architectural pattern"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - pattern_name
        - context
        - solution
      properties:
        pattern_name:
          type: string
        context:
          type: string
          description: "When to use this pattern"
        solution:
          type: string
          description: "How the pattern solves the problem"
  - name: architectural-decision
    description: "An architectural decision with full context"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - decision
        - rationale
      properties:
        decision:
          type: string
          description: "The decision made"
        rationale:
          type: string
          description: "Why this decision was made"
        alternatives:
          type: array
          description: "Alternatives considered"
          items:
            type: object
  - name: adoption-trend
    description: "A momentum, maturation, or standardization signal in the direction of travel"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - trend_name
        - direction
      properties:
        trend_name:
          type: string
        direction:
          type: string
          description: "Where the trend is heading"
        evidence:
          type: string
          description: "Signals supporting the trend"
        maturity:
          type: string
          description: "How established the trend is (emerging, mainstream)"
  - name: delivery-metric
    description: "A data-delivery, market, or reliability metric (e.g. revenue, TAM, MTTR, SLO, throughput)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - metric_name
      properties:
        metric_name:
          type: string
        definition:
          type: string
          description: "What the metric measures"
        benchmark:
          type: string
          description: "Target or reported value"
        source:
          type: string
          description: "Originating framework or study"
  - name: compliance-regulation
    description: "A law, regulation, or government mandate bearing on data governance"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - regulation_name
        - jurisdiction
      properties:
        regulation_name:
          type: string
        jurisdiction:
          type: string
          description: "Governing jurisdiction (e.g. EU, US federal, California)"
        key_obligations:
          type: string
          description: "Core obligations the regulation imposes"
        effective_dates:
          type: string
          description: "Relevant entry-into-force or compliance deadlines"
  - name: security-framework
    description: "A security, assurance, or control framework, taxonomy, or standard (e.g. COSO, NIST CSF, RBAC/ABAC models)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - framework_name
        - scope
      properties:
        framework_name:
          type: string
        scope:
          type: string
          description: "What the framework governs"
        maintainer:
          type: string
          description: "Organization that maintains the framework"
  - name: security-threat
    description: "A security threat, attack class, or vulnerability affecting data systems"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - threat_name
        - attack_vector
      properties:
        threat_name:
          type: string
        attack_vector:
          type: string
          description: "How the threat is exploited"
        impact:
          type: string
          description: "What an attacker gains or breaks"
        mitigation_summary:
          type: string
          description: "Primary defenses against this threat"
  - name: engineering-practice
    description: "An organizational, cultural, or operating practice (e.g. data mesh, federated governance, stewardship roles)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - practice_name
      properties:
        practice_name:
          type: string
        description:
          type: string
          description: "What the practice is"
        evidence:
          type: string
          description: "Empirical support or outcome"
        origin:
          type: string
          description: "Originating model, study, or author"
  - name: process-discipline
    description: "A governance or production-readiness discipline (e.g. RACI, change enablement, stewardship cadence, escalation path)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - discipline_name
      properties:
        discipline_name:
          type: string
        purpose:
          type: string
          description: "What the discipline governs"
        criteria:
          type: string
          description: "Acceptance or gating criteria"
        stage:
          type: string
          description: "Lifecycle stage where it applies"

# Traits (Mixins)
traits:
  cited:
    description: "Requires citations/sources"
    requires:
      - citations
  versioned:
    description: "Adds version tracking fields"
    fields:
      version:
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+.*$"
  documented:
    description: "Adds documentation reference"
    fields:
      documentation_url:
        type: string
        format: uri

# Relationships
relationships:
  enforces:
    description: "A governance policy or contract enforces a quality rule"
    from:
      - data-governance-policy
      - data-contract
    to:
      - data-quality-rule
    symmetric: false
  governs:
    description: "A policy or platform governs a data product or architecture"
    from:
      - data-governance-policy
      - data-platform
    to:
      - data-product
      - storage-architecture
    symmetric: false
  implements:
    description: "A platform or architecture implements a pattern or decision"
    from:
      - data-platform
      - storage-architecture
    to:
      - pipeline-pattern
      - design-pattern
      - architectural-decision
    symmetric: false

# Discovery Configuration
discovery:
  enabled: true
  confidence_threshold: 0.8
  patterns:
    - content_pattern: "\\b(Snowflake|Postgres|PostgreSQL|BigQuery|Redshift)\\b"
      suggest_entity: data-platform
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(dbt|Airflow|Kafka|Iceberg|Delta\\s+Lake|Unity\\s+Catalog|Polaris)\\b"
      suggest_entity: data-platform
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(write-audit-publish|WAP|reverse-ETL|ELT|ETL)\\b"
      suggest_entity: pipeline-pattern
      suggest_namespace: _procedural/patterns
