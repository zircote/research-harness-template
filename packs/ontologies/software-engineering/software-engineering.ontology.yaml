---
# Software Engineering Ontology
#
# A comprehensive ontology for software development teams.
# Extends the MIF base ontology with domain-specific entity types.
#
# Compatible with: mif-base v0.1.0 (cognitive triad hierarchy)
#
# Version: 0.4.0
# Last Updated: 2026-06-24
#
# 0.4.0 (domain-ontology-pack-expansion): security-threat, security-framework, and
# compliance-regulation EXTENDED with strict-superset fields for the new security
# and regulatory-legal packs; security-incident added (specialization of
# incident-report). adoption-trend DEPRECATED — its canonical successor `trend` is
# extracted into the new trend-analysis pack; retained (not deleted) for back-compat.

ontology:
  id: software-engineering
  version: "0.4.0"
  description: "Software engineering domain ontology"
  extends:
    - mif-base
    - shared-traits
# Custom Namespaces
# These extend the base cognitive triad hierarchy.
namespaces:
  semantic:
    children:
      architecture:
        description: "System architecture and component designs"
        type_hint: semantic
      components:
        description: "Software components, modules, services"
        type_hint: semantic
      dependencies:
        description: "Third-party libraries, packages, integrations"
        type_hint: semantic
  procedural:
    children:
      deployments:
        description: "Deployment procedures, release processes"
        type_hint: procedural
# Entity Types
# Structured entities with JSON Schema validation.
entity_types:
  - name: component
    description: "A software component, module, or service"
    base: semantic
    traits:
      - versioned
      - documented
    schema:
      required:
        - name
        - responsibility
      properties:
        name:
          type: string
          description: "Component name"
        responsibility:
          type: string
          description: "Single responsibility description"
        dependencies:
          type: array
          description: "List of component dependencies"
          items:
            type: string
        interfaces:
          type: array
          description: "Public interfaces/APIs"
          items:
            type: string
        owner:
          type: string
          description: "Team or person owning this component"
  - name: architectural-decision
    description: "An architectural decision with full context"
    base: semantic
    traits:
      - dated
      - cited
    schema:
      required:
        - decision
        - rationale
      properties:
        decision:
          type: string
          description: "The decision made"
        rationale:
          type: string
          description: "Why this decision was made"
        alternatives:
          type: array
          description: "Alternatives considered"
          items:
            type: object
        consequences:
          type: object
          description: "Known consequences and trade-offs"
        status:
          type: string
          description: "Decision status"
          enum:
            - proposed
            - accepted
            - deprecated
            - superseded
  - name: incident-report
    description: "A production incident or outage report"
    base: episodic
    traits:
      - timeline
      - stakeholders
    schema:
      required:
        - severity
        - impact
        - resolution
      properties:
        severity:
          type: string
          description: "Incident severity level"
          enum:
            - critical
            - high
            - medium
            - low
        impact:
          type: string
          description: "Business/user impact description"
        resolution:
          type: string
          description: "How the incident was resolved"
        root_cause:
          type: string
          description: "Root cause analysis"
        prevention:
          type: array
          description: "Prevention measures"
          items:
            type: string
        duration_minutes:
          type: integer
          description: "Incident duration in minutes"
  # 0.4.0 ADD — a security breach specialization of incident-report (VERIS schema).
  # An ops outage and a security breach share the episodic incident shape; a disjoint
  # type would fork the incident graph (domain-ontology-pack-expansion, security-pack-spec).
  - name: security-incident
    description: "A security breach/incident — a specialization of incident-report carrying the VERIS four A's"
    base: episodic
    # VERIS — Incident (Actor + Action + Asset + Attribute)
    traits:
      - timeline
      - stakeholders
      - cited
    schema:
      required:
        - severity
        - impact
        - resolution
      properties:
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
        impact:
          type: string
        resolution:
          type: string
        actor:
          type: string
          description: "VERIS Actor — external / internal / partner"
        action:
          type: string
          description: "VERIS Action — malware / hacking / social / error / misuse"
        asset:
          type: string
          description: "VERIS Asset — the device/data affected"
        attribute:
          type: string
          description: "VERIS Attribute — how affected (CIA)"
  - name: technology
    description: "A technology, framework, or tool"
    base: semantic
    traits:
      - versioned
      - documented
    schema:
      required:
        - name
        - category
      properties:
        name:
          type: string
        category:
          type: string
          enum:
            - database
            - framework
            - language
            - infrastructure
            - tool
            - library
        website:
          type: string
          format: uri
        license:
          type: string
        use_case:
          type: string
          description: "Why/where we use this technology"
  - name: design-pattern
    description: "A design pattern or architectural pattern"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - pattern_name
        - context
        - solution
      properties:
        pattern_name:
          type: string
        context:
          type: string
          description: "When to use this pattern"
        solution:
          type: string
          description: "How the pattern solves the problem"
        consequences:
          type: object
          description: "Trade-offs and implications"
        related_patterns:
          type: array
          items:
            type: string
  - name: runbook
    description: "Operational runbook for handling scenarios"
    base: procedural
    traits:
      - versioned
      - stakeholders
    schema:
      required:
        - title
        - trigger
        - procedure
      properties:
        title:
          type: string
        trigger:
          type: string
          description: "What triggers this runbook"
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
        procedure:
          type: array
          description: "Step-by-step procedure"
          items:
            type: object
            properties:
              step:
                type: integer
              action:
                type: string
              expected_outcome:
                type: string
        escalation:
          type: object
          description: "Escalation path"
  - name: deployment-procedure
    description: "Step-by-step deployment or release procedure"
    base: procedural
    traits:
      - versioned
      - stakeholders
    schema:
      required:
        - name
        - steps
        - target_environment
      properties:
        name:
          type: string
        steps:
          type: array
          items:
            type: object
            properties:
              order:
                type: integer
              action:
                type: string
              verification:
                type: string
              rollback:
                type: string
        target_environment:
          type: string
          enum:
            - development
            - staging
            - production
        prerequisites:
          type: array
          items:
            type: string
  - name: migration-guide
    description: "Database or system migration procedure"
    base: procedural
    traits:
      - versioned
      - dated
    schema:
      required:
        - title
        - from_state
        - to_state
        - steps
      properties:
        title:
          type: string
        from_state:
          type: string
        to_state:
          type: string
        steps:
          type: array
          items:
            type: object
        rollback_procedure:
          type: array
          items:
            type: object
        downtime_required:
          type: boolean
  - name: security-threat
    description: "A security threat, attack class, or vulnerability affecting the software lifecycle"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - threat_name
        - attack_vector
      properties:
        threat_name:
          type: string
        attack_vector:
          type: string
          description: "How the threat is exploited"
        impact:
          type: string
          description: "What an attacker gains or breaks"
        mitigation_summary:
          type: string
          description: "Primary defenses against this threat"
        references:
          type: array
          items:
            type: string
        # 0.4.0 EXTEND (MITRE ATT&CK / CAPEC) — strict superset, required set unchanged
        attack_id:
          type: string
          description: "ATT&CK technique/sub-technique (e.g. T1566) or CAPEC ID"
        tactic:
          type: string
          description: "ATT&CK tactic / kill-chain phase"
        adversary:
          type: string
          description: "Intrusion set / ATT&CK Group"
  - name: security-framework
    description: "A security or assurance framework, taxonomy, or standard (e.g. OWASP Top 10, MITRE ATLAS, SLSA, NIST SSDF)"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - framework_name
        - scope
      properties:
        framework_name:
          type: string
        scope:
          type: string
          description: "What the framework governs (e.g. application risk, supply-chain integrity, adversary TTPs)"
        maintainer:
          type: string
          description: "Organization that maintains the framework"
        relationship:
          type: string
          description: "How it relates to or composes with other frameworks"
        # 0.4.0 EXTEND (NIST CSF / OWASP) — strict superset, required set unchanged
        version:
          type: string
          description: "Framework version/edition (e.g. CSF 2.0, OWASP Top 10:2025)"
        structure:
          type: string
          description: "Framework structure (e.g. CSF: 6 functions / 22 categories / 106 subcategories)"
  - name: compliance-regulation
    description: "A law, regulation, or government mandate bearing on secure software development"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - regulation_name
        - jurisdiction
      properties:
        regulation_name:
          type: string
        jurisdiction:
          type: string
          description: "Governing jurisdiction (e.g. EU, US federal)"
        key_obligations:
          type: string
          description: "Core obligations the regulation imposes"
        effective_dates:
          type: string
          description: "Relevant entry-into-force or compliance deadlines"
        # 0.4.0 EXTEND (LKIF-Core / FIBO FBC) — strict superset, required set unchanged
        legal_source_type:
          type: string
          description: "LKIF legal-source kind: statute, regulation, directive, customary law, case law"
        citation_ref:
          type: string
          description: "Official citation (e.g. Regulation (EU) 2016/679)"
  # DEPRECATED in 0.4.0: the canonical generic `trend` is extracted into the
  # trend-analysis pack. adoption-trend is retained (not deleted) so existing
  # typed instances do not dangle; prefer trend-analysis `trend` for new typing.
  - name: adoption-trend
    description: "DEPRECATED (0.4.0) — superseded by trend-analysis `trend`. A momentum, maturation, or standardization signal in the direction of travel."
    deprecated: true
    base: semantic
    traits:
      - cited
    schema:
      required:
        - trend_name
        - direction
      properties:
        trend_name:
          type: string
        direction:
          type: string
          description: "Where the trend is heading"
        evidence:
          type: string
          description: "Signals supporting the trend"
        maturity:
          type: string
          description: "How established the trend is (e.g. emerging, mainstream)"
  - name: delivery-metric
    description: A software-delivery or reliability metric (e.g. DORA four/five keys, SLO/SLI, MTTR)
    base: semantic
    traits:
      - cited
    schema:
      required:
        - metric_name
      properties:
        metric_name:
          type: string
        definition:
          type: string
          description: What the metric measures
        benchmark:
          type: string
          description: Target or elite-tier value
        source:
          type: string
          description: Originating framework or study
  - name: engineering-practice
    description: An organizational, cultural, or reliability practice (e.g. blameless postmortems, you-build-it-you-run-it, psychological safety)
    base: semantic
    traits:
      - cited
    schema:
      required:
        - practice_name
      properties:
        practice_name:
          type: string
        description:
          type: string
          description: What the practice is
        evidence:
          type: string
          description: Empirical support or outcome
        origin:
          type: string
          description: Originating model, study, or author
  - name: process-discipline
    description: A governance or production-readiness discipline (e.g. PRR, ORR, ITIL change enablement, CAB, acceptance criteria)
    base: semantic
    traits:
      - cited
    schema:
      required:
        - discipline_name
      properties:
        discipline_name:
          type: string
        purpose:
          type: string
          description: What the discipline governs
        criteria:
          type: string
          description: Acceptance or gating criteria
        stage:
          type: string
          description: SDLC stage where it applies
# Traits (Mixins)
traits:
  versioned:
    description: "Adds version tracking fields"
    fields:
      version:
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+.*$"
      changelog:
        type: array
        items:
          type: object
  documented:
    description: "Adds documentation reference"
    fields:
      documentation_url:
        type: string
        format: uri
      readme_path:
        type: string
  dated:
    description: "Adds decision/event date"
    fields:
      decision_date:
        type: string
        format: date
      review_date:
        type: string
        format: date
  cited:
    description: "Requires citations/sources"
    requires:
      - citations
  timeline:
    description: "Adds incident timeline"
    fields:
      timeline:
        type: array
        items:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
            event:
              type: string
            actor:
              type: string
  stakeholders:
    description: "Adds stakeholder tracking"
    fields:
      stakeholders:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            role:
              type: string
            contact:
              type: string
# Relationships
relationships:
  depends_on:
    description: "Component dependency relationship"
    from:
      - component
    to:
      - component
      - technology
    symmetric: false
  implements:
    description: "Component implements a pattern or decision"
    from:
      - component
    to:
      - design-pattern
      - architectural-decision
    symmetric: false
  caused_by:
    description: "Incident causality"
    from:
      - incident-report
    to:
      - component
      - technology
    symmetric: false
  resolves:
    description: "Decision resolves an issue"
    from:
      - architectural-decision
    to:
      - incident-report
    symmetric: false
  supersedes:
    description: "Newer version supersedes older"
    from:
      - architectural-decision
      - component
      - runbook
      - deployment-procedure
    to:
      - architectural-decision
      - component
      - runbook
      - deployment-procedure
    symmetric: false
  documents:
    description: "Procedure documents how to work with entity"
    from:
      - runbook
      - deployment-procedure
      - migration-guide
    to:
      - component
      - technology
    symmetric: false
  triggers:
    description: "Incident triggers runbook execution"
    from:
      - incident-report
    to:
      - runbook
    symmetric: false
# Discovery Configuration
discovery:
  enabled: true
  confidence_threshold: 0.8
  patterns:
    # Technology patterns - suggest _semantic/knowledge namespace
    - content_pattern: "\\b(PostgreSQL|MySQL|MongoDB|Redis)\\b"
      suggest_entity: technology
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(React|Vue|Angular|Next\\.js|Django)\\b"
      suggest_entity: technology
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(FastAPI|Express|Flask|Spring)\\b"
      suggest_entity: technology
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(Docker|Kubernetes|Terraform|AWS)\\b"
      suggest_entity: technology
      suggest_namespace: _semantic/entities
    # Pattern patterns - suggest _procedural/patterns
    - content_pattern: "\\b(Factory|Singleton|Observer)\\s+Pattern\\b"
      suggest_entity: design-pattern
      suggest_namespace: _procedural/patterns
    - content_pattern: "\\b(Repository|Strategy|Decorator)\\s+Pattern\\b"
      suggest_entity: design-pattern
      suggest_namespace: _procedural/patterns
    - content_pattern: "\\b(CQRS|Event\\s+Sourcing|Saga)\\b"
      suggest_entity: design-pattern
      suggest_namespace: _procedural/patterns
    # Component patterns from file paths
    - file_pattern: "**/services/**/*.py"
      suggest_entity: component
      suggest_namespace: _semantic/components
    - file_pattern: "**/components/**/*.tsx"
      suggest_entity: component
      suggest_namespace: _semantic/components
    # Incident patterns - suggest _episodic/incidents
    - content_pattern: "\\b(outage|incident|postmortem|RCA)\\b"
      suggest_entity: incident-report
      suggest_namespace: _episodic/incidents
    # Procedural patterns
    - content_pattern: "\\b(runbook|playbook|SOP|procedure)\\b"
      suggest_entity: runbook
      suggest_namespace: _procedural/runbooks
    - content_pattern: "\\b(deploy|release|rollout)\\s+(steps|procedure)\\b"
      suggest_entity: deployment-procedure
      suggest_namespace: _procedural/deployments
    - content_pattern: "\\b(migration|migrate|upgrade)\\s+(guide|plan)\\b"
      suggest_entity: migration-guide
      suggest_namespace: _procedural/migrations
    - file_pattern: "**/runbooks/**/*.md"
      suggest_entity: runbook
      suggest_namespace: _procedural/runbooks
    - file_pattern: "**/docs/procedures/**/*.md"
      suggest_entity: deployment-procedure
      suggest_namespace: _procedural/deployments
