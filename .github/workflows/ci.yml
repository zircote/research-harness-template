name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install toolchain
        run: |
          # Package-manager installs are integrity-verified against the registry by
          # the manager itself (npm SHA-512 integrity, pip hashes) — verification is
          # built into the download.
          npm install -g ajv-cli ajv-formats markdownlint-cli2
          pipx install copier

      - name: Install yq (verified download — attestation -> checksum waterfall)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Supply-chain policy: a raw binary download MUST be verified. Prefer a
          # GitHub build-provenance attestation; when upstream publishes none
          # (mikefarah/yq does not), relax to the minimum — a pinned SHA-256 cross-
          # checked against the upstream signed `checksums`. Refuse to install if
          # neither passes. yq is pinned (not "latest") so the digest is stable.
          YQ_VERSION=v4.53.3
          YQ_SHA256=fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          if gh attestation verify /tmp/yq --repo mikefarah/yq >/dev/null 2>&1; then
            echo "yq ${YQ_VERSION}: verified via gh build-provenance attestation"
          elif echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -; then
            echo "yq ${YQ_VERSION}: no upstream attestation — verified via pinned SHA-256 (checksum floor)"
          else
            echo "yq ${YQ_VERSION}: VERIFICATION FAILED — refusing to install" >&2
            exit 1
          fi
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

      - name: Tool versions
        run: |
          node --version
          python3 --version
          jq --version
          yq --version
          ajv help >/dev/null 2>&1 && echo "ajv-cli present"
          markdownlint-cli2 --version
          copier --version

      - name: model codegen in sync (regenerate from schemas, fail if committed models drift)
        run: CHECK=1 bash scripts/codegen/gen-models.sh  # self-provisions a pinned venv

      - name: verify.sh (build gate — schemas, citation gate, per-milestone gates, evals)
        run: bash scripts/verify.sh

      - name: eval suite (shipped + run in CI)
        run: bash evals/run-evals.sh

      - name: copier update propagation
        run: bash evals/copier-update.sh

      - name: markdownlint (G5 — 0 errors)
        run: markdownlint-cli2 "**/*.md"

  pin-check:
    # Supply-chain gate: every GitHub Actions `uses:` across all workflow files
    # must be pinned to a full 40-char commit SHA (a tag/branch ref is mutable
    # and re-pointable). Fails closed if any unpinned action is found.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: All actions are SHA-pinned
        run: |
          set -euo pipefail
          # Match only real `uses:` step keys (optionally `- ` prefixed) at the
          # start of a line, so commented examples never trip the gate.
          unpinned=$(grep -rhoE '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+\S+@\S+' .github/workflows/ | grep -ivE '@[0-9a-f]{40}' || true)
          if [ -n "${unpinned}" ]; then
            echo "Unpinned actions found (pin to a 40-char commit SHA):" >&2
            echo "${unpinned}" >&2
            exit 1
          fi
          echo "pin-check: every action is pinned to a 40-char commit SHA"
