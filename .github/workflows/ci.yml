name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install toolchain
        run: npm install -g ajv-cli ajv-formats markdownlint-cli2

      - name: Tool versions
        run: |
          node --version
          jq --version
          ajv help >/dev/null 2>&1 && echo "ajv-cli present"
          markdownlint-cli2 --version

      - name: verify.sh (build gate — schemas, citation gate, per-milestone gates, evals)
        run: bash scripts/verify.sh

      - name: markdownlint (G5 — 0 errors)
        run: markdownlint-cli2 "**/*.md"
