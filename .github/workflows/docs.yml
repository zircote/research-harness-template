name: docs

# Build-only gate for the research-harness documentation site (Astro/Starlight,
# base "/research-harness"). This repo does NOT deploy itself: the org Pages shell
# (modeled-information-format.github.io / .github/workflows/deploy.yml) checks this
# repo out, runs `npm run build`, and mounts dist/ under /research-harness — exactly
# how doc-site is served under /docs. A green build here is the local success gate.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "packs/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-pack-docs.py"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "packs/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-pack-docs.py"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (validates the Starlight site + all internal links)
        run: npm run build

      - name: Pack docs coverage (bidirectional docs <-> packs cross-links)
        run: python3 scripts/check-pack-docs.py
