# mif-generic — the basic generic ontology, ALWAYS enabled for every topic.
# Harness-authored from MIF's built-in entity types (the mif.schema entity-reference
# enum: Concept, Person, Organization, Technology, File), expressed as ontology
# entity_types so any finding in any topic can be classified to a generic type even
# with no domain ontology bound. Domain ontologies (packs/ontologies/) add more
# specific types on top; where a name collides, the finding must name ontology.id.
ontology:
  id: mif-generic
  version: 1.0.0
  description: Basic generic ontology (MIF built-in entity types); always enabled for all topics.
  extends:
    - mif-base
entity_types:
  - name: concept
    base: semantic
    description: An abstract idea, theme, method, or topic.
    schema:
      required: [name]
      properties:
        name: { type: string, description: Concept name }
  - name: person
    base: semantic
    description: An individual human actor.
    schema:
      required: [name]
      properties:
        name: { type: string, description: Person name }
  - name: organization
    base: semantic
    description: A company, institution, agency, or group.
    schema:
      required: [name]
      properties:
        name: { type: string, description: Organization name }
  - name: technology
    base: semantic
    description: A tool, system, framework, standard, or product.
    schema:
      required: [name]
      properties:
        name: { type: string, description: Technology name }
  - name: file
    base: semantic
    description: A document, dataset, or artifact.
    schema:
      required: [name]
      properties:
        name: { type: string, description: File name or path }
# MIF-native STRUCTURAL relationships — the core, domain-agnostic links that connect
# any concept/entity across the corpus (SPEC relationship vocabulary). They are core
# (always available) and NOT from/to-constrained; validate-concordance.sh treats
# relationships declared by a core ontology as structural (no domain check), while
# DOMAIN-ontology relationships (e.g. k12 belongs_to) keep strict from/to. The from/to
# below are permissive (the generic types) only to satisfy the contract shape.
relationships:
  supports:
    description: The source provides supporting evidence for the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
  contradicts:
    description: The source provides disconfirming evidence against the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
  derived-from:
    description: The source is derived from the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
  relates-to:
    description: A general association between source and target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
    symmetric: true
  supersedes:
    description: The source supersedes (replaces) the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
  refines:
    description: The source refines or narrows the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
  part-of:
    description: The source is a part of the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
  depends-on:
    description: The source depends on the target.
    from: [concept, person, organization, technology, file]
    to: [concept, person, organization, technology, file]
