# Copier template configuration (SPEC §7). The harness is distributed as a
# living, update-propagating template: `copier copy` instantiates it and
# `copier update` re-applies later template improvements to an already-
# instantiated harness (the decisive differentiator over snapshot engines).
#
# Only *.jinja files are rendered (suffix stripped on generation); every other
# file in the repo is copied verbatim, so the harness's own contracts, scripts,
# agents, and gates travel unchanged and the template repo keeps passing its own
# gates. The one file a clone then edits by hand is harness.config.json.

_templates_suffix: ".jinja"
_answers_file: ".copier-answers.yml"
_subdirectory: "."

# Files that must never be copied into an instantiated harness.
_exclude:
  - "copier.yml"
  - ".git"
  - ".github/workflows/*"  # the template's own CI; instances opt in separately
  - "node_modules"
  - "**/__pycache__"
  - "*.pyc"
  - ".venv-codegen"          # dev/build-time codegen venv; generated models under lib/ are shipped
  - "PROGRESS.md"            # the template's build log, not the instance's
  - "COMPLETION-CRITERIA.md"
  - "IMPLEMENTATION-PLAN.md"
  # NOTE: reports/example-okf-mif-knowledge-spine/ is intentionally NOT excluded. The
  # template serves this single ARCHIVED example research topic straight out of reports/
  # as its worked showcase, and clones inherit it: the post-copy `seed-example-topic.sh`
  # task (below) strips the `example-` prefix to `okf-mif-knowledge-spine` so every clone
  # starts with it as a seed fixture. That task is idempotent and self-cleaning, which is
  # what keeps `copier update` conflict-free (the prefixed copy re-shipped on update is
  # discarded; the renamed, instance-owned seed is never touched).

# Instantiation Q&A.
project_name:
  type: str
  help: "Name of your research harness"
  default: "research-harness"

author_name:
  type: str
  help: "Your name or organization (the harness owner)"
  default: "zircote"

# Post-generation tasks (run only with `copier copy --trust` / `copier update --trust`):
#   1. site-toggle: a clone's primary local mode of consuming its research is the
#      Astro/Starlight site rendering reports/, so flip the site to reports-primary
#      (the template itself ships docs-primary). Edits only `.site.primarySurface`.
#   2. site symlinks: re-establish docs/reports + src/content/docs, which copier
#      flattens into real dirs on render, so the Astro content collection resolves.
#   3. seed-example-topic: rename the shipped archived example topic
#      (example-okf-mif-knowledge-spine -> okf-mif-knowledge-spine) so the clone starts
#      with it as a seed fixture. Idempotent + self-cleaning; no-op in the template
#      itself. Without `--trust` the clone keeps the `example-`-prefixed copy and the
#      user can run `bash scripts/seed-example-topic.sh` by hand.
_tasks:
  - "bash scripts/site-toggle.sh primary reports"
  # Copier renders symlinked directories as real dirs; re-establish the two
  # site symlinks so the Astro content collection reaches docs/ and reports/.
  - "rm -rf docs/reports && ln -s ../reports docs/reports"
  - "rm -rf src/content/docs && ln -s ../../docs src/content/docs"
  - "bash scripts/seed-example-topic.sh"

_message_after_copy: |
  Your research harness is ready.

  The Astro/Starlight site renders your reports/ for local human reading and is
  set to reports-primary. Read your reports with:

      npm install
      npm run dev        # or: npm run preview   (after `npm run build`)

  Change which surface leads or toggle site plugins any time:

      bash scripts/site-toggle.sh primary <reports|docs|auto>
      bash scripts/site-toggle.sh plugin <imageZoom|linksValidator|llmsTxt|mermaid> <on|off>

  Your harness ships with one archived seed topic — `okf-mif-knowledge-spine`, a worked
  OKF + MIF knowledge-spine research corpus (findings, knowledge graph, and a full set of
  genre reports) — so you can see the engine's output immediately. Browse it under
  reports/okf-mif-knowledge-spine/, then run `/start` to research your own first topic.
