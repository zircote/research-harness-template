# Copier template configuration (SPEC §7). The harness is distributed as a
# living, update-propagating template: `copier copy` instantiates it and
# `copier update` re-applies later template improvements to an already-
# instantiated harness (the decisive differentiator over snapshot engines).
#
# Only *.jinja files are rendered (suffix stripped on generation); every other
# file in the repo is copied verbatim, so the harness's own contracts, scripts,
# agents, and gates travel unchanged and the template repo keeps passing its own
# gates. The one file a clone then edits by hand is harness.config.json.

_templates_suffix: ".jinja"
_answers_file: ".copier-answers.yml"
_subdirectory: "."

# Files that must never be copied into an instantiated harness.
_exclude:
  - "copier.yml"
  - ".git"
  - ".github/workflows/*"  # the template's own CI; instances opt in separately
  - "node_modules"
  - "**/__pycache__"
  - "*.pyc"
  - ".venv-codegen"          # dev/build-time codegen venv; generated models under lib/ are shipped
  - "PROGRESS.md"            # the template's build log, not the instance's
  - "COMPLETION-CRITERIA.md"
  - "IMPLEMENTATION-PLAN.md"
  # The bundled example-topic report demonstrates the reports site IN THE TEMPLATE
  # only. A clone must NOT inherit it: copier's default topic_id is `example-topic`,
  # so the user's first `/start` regenerates reports/example-topic/example-topic.md;
  # if the template's copy also travelled, a later `copier update` would conflict on
  # that regenerated, template-managed file. Excluding it keeps clones clean and
  # `copier update` conflict-free — the clone populates its own reports.
  - "reports/example-topic/**"

# Instantiation Q&A.
project_name:
  type: str
  help: "Name of your research harness"
  default: "research-harness"

author_name:
  type: str
  help: "Your name or organization (the harness owner)"
  default: "zircote"

topic_id:
  type: str
  help: "The id of your first research topic (kebab-case)"
  default: "example-topic"

topic_title:
  type: str
  help: "A human-readable title for that topic"
  default: "Example research topic"

# Post-generation activation. A clone's primary local mode of consuming its
# research is the Astro/Starlight site rendering reports/, so on instantiation we
# flip the site to reports-primary (the template itself ships docs-primary). This
# only edits `.site.primarySurface` in the clone's harness.config.json; the site
# still builds docs-primary until the clone's first report exists. copier runs
# `_tasks` only with `copier copy --trust`; without it the clone stays docs-primary
# and the user can run `bash scripts/site-toggle.sh primary reports` by hand.
_tasks:
  - "bash scripts/site-toggle.sh primary reports"

_message_after_copy: |
  Your research harness is ready.

  The Astro/Starlight site renders your reports/ for local human reading and is
  set to reports-primary. Read your reports with:

      npm install
      npm run dev        # or: npm run preview   (after `npm run build`)

  Change which surface leads or toggle site plugins any time:

      bash scripts/site-toggle.sh primary <reports|docs|auto>
      bash scripts/site-toggle.sh plugin <imageZoom|linksValidator|llmsTxt|mermaid> <on|off>

  Then run `/start` to research your first topic.
